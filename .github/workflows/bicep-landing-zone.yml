name: Bicep – Landing Zone CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'bicep/**'
  pull_request:
    branches: [main]
    paths:
      - 'bicep/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  # ── Build & Validate ───────────────────────────────────────────────────────
  validate:
    name: Bicep Build & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Install Bicep CLI
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/bicep

      - name: Build (Lint) Bicep
        run: bicep build bicep/landing-zone/main.bicep

      - name: Bicep Lint
        run: az bicep lint --file bicep/landing-zone/main.bicep

  # ── What-If ────────────────────────────────────────────────────────────────
  what_if:
    name: Deployment What-If
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Run What-If
        id: whatif
        run: |
          az deployment sub what-if \
            --location eastus \
            --template-file bicep/landing-zone/main.bicep \
            --parameters bicep/landing-zone/parameters/dev.bicepparam \
            --no-pretty-print 2>&1 | tee whatif-output.txt

      - name: Comment What-If on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('whatif-output.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### Bicep What-If 🔭\n\`\`\`\n${output.slice(0, 60000)}\n\`\`\``
            });

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Bicep
    runs-on: ubuntu-latest
    needs: what_if
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Deploy Bicep Landing Zone
        run: |
          az deployment sub create \
            --location eastus \
            --template-file bicep/landing-zone/main.bicep \
            --parameters bicep/landing-zone/parameters/dev.bicepparam \
            --name "deploy-landing-zone-$(date +%Y%m%d%H%M%S)"
